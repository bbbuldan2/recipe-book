<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>반쪽이네 레시피모음집</title>
    <style>
      :root {
        --bg: #f8faf7;
        --paper: #ffffff;
        --ink: #20231f;
        --muted: #667060;
        --line: #d9e0d6;
        --green: #2e7d73;
        --red: #d44c32;
        --red-soft: #fff0ec;
        --mint: #e8f3ef;
        --yellow: #fff9db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", Arial,
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      header {
        border-bottom: 1px solid #dde5d9;
        background: var(--paper);
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px 16px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--green);
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 7vw, 44px);
        line-height: 1.12;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        min-width: 110px;
      }

      .stat {
        border: 1px solid var(--line);
        background: var(--bg);
        padding: 12px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 22px;
      }

      .search {
        margin-top: 22px;
      }

      .search label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .searchbox {
        display: flex;
        min-height: 52px;
        overflow: hidden;
        border: 1px solid #b9c5b4;
        background: var(--paper);
      }

      .searchbox:focus-within {
        border-color: var(--red);
        box-shadow: 0 0 0 3px #f1b4a7;
      }

      input[type="search"] {
        min-width: 0;
        flex: 1;
        border: 0;
        padding: 14px;
        outline: 0;
        font-size: 16px;
      }

      .clear {
        width: 52px;
        border: 0;
        border-left: 1px solid var(--line);
        background: var(--paper);
        color: var(--muted);
        font-size: 24px;
      }

      main.wrap {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.35fr);
        gap: 20px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      h2,
      h3 {
        margin: 0;
      }

      .count {
        color: var(--muted);
        font-size: 14px;
      }

      .results {
        display: grid;
        gap: 12px;
      }

      .recipe-button {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--paper);
        padding: 16px;
        text-align: left;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease;
      }

      .recipe-button:hover,
      .recipe-button.active {
        border-color: var(--red);
        box-shadow: 0 8px 18px rgb(32 35 31 / 7%);
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .recipe-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      .servings {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        align-self: flex-start;
        flex-shrink: 0;
        background: var(--red-soft);
        color: #b43a24;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .ingredients-line {
        display: -webkit-box;
        overflow: hidden;
        margin: 12px 0 0;
        color: #4f594b;
        font-size: 14px;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .matches {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .match {
        background: var(--mint);
        color: #28665e;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .detail {
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .detail-inner {
        padding: 22px;
      }

      .detail-header {
        border-bottom: 1px solid #e3e9df;
        padding-bottom: 18px;
      }

      .detail-title {
        font-size: 28px;
        font-weight: 900;
      }

      .detail-servings {
        margin-top: 8px;
        color: var(--green);
        font-size: 14px;
        font-weight: 800;
      }

      .columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
        padding: 22px 0;
      }

      ul,
      ol {
        margin: 0;
        padding: 0;
      }

      .pill-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        list-style: none;
      }

      .pill-list li {
        border: 1px solid #e3e9df;
        background: var(--bg);
        padding: 10px;
        font-size: 14px;
      }

      .seasoning li {
        border-color: #f0d3cc;
        background: #fff7f5;
      }

      .steps {
        border-top: 1px solid #e3e9df;
        padding-top: 22px;
      }

      .step-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
        list-style: none;
      }

      .step-list li {
        display: flex;
        gap: 12px;
        font-size: 15px;
        line-height: 1.65;
      }

      .step-number {
        display: inline-flex;
        width: 28px;
        height: 28px;
        flex: 0 0 28px;
        align-items: center;
        justify-content: center;
        background: var(--green);
        color: white;
        font-size: 14px;
        font-weight: 800;
      }

      .note {
        margin-top: 22px;
        border: 1px solid #e4d7a8;
        background: var(--yellow);
        padding: 16px;
      }

      .note p {
        margin: 8px 0 0;
        color: #5e5730;
        font-size: 14px;
        line-height: 1.65;
      }

      .empty {
        border: 1px dashed #b9c5b4;
        background: var(--paper);
        padding: 20px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 820px) {
        .top {
          align-items: stretch;
          flex-direction: column;
        }

        .stats {
          min-width: 0;
        }

        main.wrap {
          grid-template-columns: 1fr;
        }

        .columns {
          grid-template-columns: 1fr;
        }

        .detail-inner {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="top">
          <div>
            <p class="eyebrow">Recipe Archive</p>
            <h1>반쪽이네 레시피모음집</h1>
          </div>
          <div class="stats">
            <div class="stat">
              <span>레시피</span>
              <strong id="recipeTotal">0</strong>
            </div>
          </div>
        </div>

        <div class="search">
          <label for="searchInput">재료 검색</label>
          <div class="searchbox">
            <input
              id="searchInput"
              type="search"
              placeholder="닭고기, 양파, 간장"
              autocomplete="off"
            />
            <button
              id="clearButton"
              class="clear"
              type="button"
              aria-label="검색어 지우기"
              title="검색어 지우기"
            >
              ×
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section>
        <div class="section-title">
          <h2>검색 결과</h2>
          <span id="resultCount" class="count">0개</span>
        </div>
        <div id="results" class="results"></div>
      </section>

      <article id="detail" class="detail"></article>
    </main>

    <script>
      let recipes = [];

      const ingredientAliases = {
        닭고기: ["닭", "닭고기", "닭정육"],
        돼지고기: ["돼지", "돼지고기", "앞다리살", "돼지고기다짐육"],
        소고기: ["소고기", "쇠고기", "소고기다짐육"],
        고기: ["고기", "앞다리살", "다짐육", "닭정육"],
        옥수수: ["옥수수", "초당옥수수", "스위트콘", "콘"],
        면: ["면", "중화면", "파스타", "숏파스타"],
        버섯: ["버섯", "팽이버섯", "표고버섯"],
        치즈: ["치즈", "모짜렐라치즈", "파마산치즈"],
      };

      const searchInput = document.querySelector("#searchInput");
      const clearButton = document.querySelector("#clearButton");
      const results = document.querySelector("#results");
      const detail = document.querySelector("#detail");
      const resultCount = document.querySelector("#resultCount");
      const recipeTotal = document.querySelector("#recipeTotal");

      let selectedName = "";

      function normalize(value) {
        return String(value || "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function searchTerms(query) {
        const normalized = normalize(query);

        if (!normalized) {
          return [];
        }

        return Array.from(
          new Set([
            normalized,
            ...(ingredientAliases[normalized] || []).map(normalize),
          ]),
        );
      }

      function recipeSearchText(recipe) {
        return normalize(
          [
            recipe.recipe_name,
            recipe.servings,
            ...(recipe.ingredients || []),
            ...(recipe.seasoning || []),
            ...(recipe.steps || []),
            recipe.notes,
          ]
            .filter(Boolean)
            .join(" "),
        );
      }

      function matchedItems(recipe, terms) {
        if (terms.length === 0) {
          return [];
        }

        return [...(recipe.ingredients || []), ...(recipe.seasoning || [])].filter(
          (item) => terms.some((term) => normalize(item).includes(term)),
        );
      }

      function getFilteredRecipes() {
        const terms = searchTerms(searchInput.value);

        if (terms.length === 0) {
          return recipes;
        }

        return recipes.filter((recipe) =>
          terms.some((term) => recipeSearchText(recipe).includes(term)),
        );
      }

      function renderResults(filteredRecipes) {
        const terms = searchTerms(searchInput.value);
        resultCount.textContent = `${filteredRecipes.length}개`;

        if (filteredRecipes.length === 0) {
          results.innerHTML = `<div class="empty">검색 결과가 없어요.</div>`;
          return;
        }

        results.innerHTML = filteredRecipes
          .map((recipe) => {
            const matches = matchedItems(recipe, terms);
            const active = recipe.recipe_name === selectedName ? " active" : "";
            return `
              <button class="recipe-button${active}" type="button" data-name="${escapeHtml(recipe.recipe_name)}">
                <div class="card-head">
                  <div>
                    <p class="recipe-title">${escapeHtml(recipe.recipe_name)}</p>
                    ${
                      recipe.servings
                        ? `<p class="servings">${escapeHtml(recipe.servings)}</p>`
                        : ""
                    }
                  </div>
                  <span class="badge">${(recipe.ingredients || []).length} 재료</span>
                </div>
                <p class="ingredients-line">${escapeHtml((recipe.ingredients || []).join(", "))}</p>
                ${
                  matches.length > 0
                    ? `<div class="matches">${matches
                        .slice(0, 4)
                        .map((match) => `<span class="match">${escapeHtml(match)}</span>`)
                        .join("")}</div>`
                    : ""
                }
              </button>
            `;
          })
          .join("");

        document.querySelectorAll(".recipe-button").forEach((button) => {
          button.addEventListener("click", () => {
            selectedName = button.dataset.name;
            render();
            detail.scrollIntoView({ block: "start", behavior: "smooth" });
          });
        });
      }

      function renderDetail(recipe) {
        if (!recipe) {
          detail.innerHTML = `<div class="detail-inner empty">레시피를 선택해 주세요.</div>`;
          return;
        }

        detail.innerHTML = `
          <div class="detail-inner">
            <div class="detail-header">
              <h2 class="detail-title">${escapeHtml(recipe.recipe_name)}</h2>
              ${
                recipe.servings
                  ? `<div class="detail-servings">${escapeHtml(recipe.servings)}</div>`
                  : ""
              }
            </div>
            <div class="columns">
              <section>
                <h3>재료</h3>
                <ul class="pill-list">
                  ${(recipe.ingredients || [])
                    .map((ingredient) => `<li>${escapeHtml(ingredient)}</li>`)
                    .join("")}
                </ul>
              </section>
              ${
                (recipe.seasoning || []).length > 0
                  ? `<section>
                      <h3>양념</h3>
                      <ul class="pill-list seasoning">
                        ${(recipe.seasoning || [])
                          .map((item) => `<li>${escapeHtml(item)}</li>`)
                          .join("")}
                      </ul>
                    </section>`
                  : ""
              }
            </div>
            <section class="steps">
              <h3>조리 순서</h3>
              <ol class="step-list">
                ${(recipe.steps || [])
                  .map(
                    (step, index) => `
                      <li>
                        <span class="step-number">${index + 1}</span>
                        <span>${escapeHtml(step)}</span>
                      </li>
                    `,
                  )
                  .join("")}
              </ol>
            </section>
            ${
              recipe.notes
                ? `<section class="note">
                    <h3>메모</h3>
                    <p>${escapeHtml(recipe.notes)}</p>
                  </section>`
                : ""
            }
          </div>
        `;
      }

      function render() {
        const filteredRecipes = getFilteredRecipes();

        if (
          filteredRecipes.length > 0 &&
          !filteredRecipes.some((recipe) => recipe.recipe_name === selectedName)
        ) {
          selectedName = filteredRecipes[0].recipe_name;
        }

        renderResults(filteredRecipes);
        renderDetail(
          filteredRecipes.find((recipe) => recipe.recipe_name === selectedName),
        );
        clearButton.style.visibility = searchInput.value ? "visible" : "hidden";
      }

      function updateStats() {
        recipeTotal.textContent = recipes.length;
      }

      async function loadRecipes() {
        try {
          const response = await fetch("recipes.json", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`recipes.json load failed: ${response.status}`);
          }

          const data = await response.json();
          recipes = Array.isArray(data) ? data : [];
          selectedName = recipes[0]?.recipe_name || "";
          updateStats();
          render();
        } catch (error) {
          console.error(error);
          recipeTotal.textContent = "0";
          resultCount.textContent = "0개";
          results.innerHTML = `<div class="empty">recipes.json 파일을 불러오지 못했어요.</div>`;
          detail.innerHTML = `<div class="detail-inner empty">GitHub Pages 링크에서 열었는지, index.html과 recipes.json이 같은 위치에 있는지 확인해 주세요.</div>`;
          clearButton.style.visibility = "hidden";
        }
      }

      searchInput.addEventListener("input", render);
      clearButton.addEventListener("click", () => {
        searchInput.value = "";
        searchInput.focus();
        render();
      });

      loadRecipes();
    </script>
  </body>
</html>
