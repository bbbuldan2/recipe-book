<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나만의 레시피북</title>
    <style>
      :root {
        --bg: #f8faf7;
        --paper: #ffffff;
        --ink: #20231f;
        --muted: #667060;
        --line: #d9e0d6;
        --green: #2e7d73;
        --red: #d44c32;
        --red-soft: #fff0ec;
        --mint: #e8f3ef;
        --yellow: #fff9db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", Arial,
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      header {
        border-bottom: 1px solid #dde5d9;
        background: var(--paper);
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px 16px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--green);
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 7vw, 44px);
        line-height: 1.12;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        min-width: 220px;
      }

      .stat {
        border: 1px solid var(--line);
        background: var(--bg);
        padding: 12px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 22px;
      }

      .search {
        margin-top: 22px;
      }

      .search label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .searchbox {
        display: flex;
        min-height: 52px;
        overflow: hidden;
        border: 1px solid #b9c5b4;
        background: var(--paper);
      }

      .searchbox:focus-within {
        border-color: var(--red);
        box-shadow: 0 0 0 3px #f1b4a7;
      }

      input[type="search"] {
        min-width: 0;
        flex: 1;
        border: 0;
        padding: 14px;
        outline: 0;
        font-size: 16px;
      }

      .clear {
        width: 52px;
        border: 0;
        border-left: 1px solid var(--line);
        background: var(--paper);
        color: var(--muted);
        font-size: 24px;
      }

      main.wrap {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.35fr);
        gap: 20px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      h2,
      h3 {
        margin: 0;
      }

      .count {
        color: var(--muted);
        font-size: 14px;
      }

      .results {
        display: grid;
        gap: 12px;
      }

      .recipe-button {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--paper);
        padding: 16px;
        text-align: left;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease;
      }

      .recipe-button:hover,
      .recipe-button.active {
        border-color: var(--red);
        box-shadow: 0 8px 18px rgb(32 35 31 / 7%);
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .recipe-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      .servings {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .badge {
        align-self: flex-start;
        flex-shrink: 0;
        background: var(--red-soft);
        color: #b43a24;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .ingredients-line {
        display: -webkit-box;
        overflow: hidden;
        margin: 12px 0 0;
        color: #4f594b;
        font-size: 14px;
        line-height: 1.55;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .matches {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .match {
        background: var(--mint);
        color: #28665e;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .detail {
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .detail-inner {
        padding: 22px;
      }

      .detail-header {
        border-bottom: 1px solid #e3e9df;
        padding-bottom: 18px;
      }

      .detail-title {
        font-size: 28px;
        font-weight: 900;
      }

      .detail-servings {
        margin-top: 8px;
        color: var(--green);
        font-size: 14px;
        font-weight: 800;
      }

      .columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
        padding: 22px 0;
      }

      ul,
      ol {
        margin: 0;
        padding: 0;
      }

      .pill-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        list-style: none;
      }

      .pill-list li {
        border: 1px solid #e3e9df;
        background: var(--bg);
        padding: 10px;
        font-size: 14px;
      }

      .seasoning li {
        border-color: #f0d3cc;
        background: #fff7f5;
      }

      .steps {
        border-top: 1px solid #e3e9df;
        padding-top: 22px;
      }

      .step-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
        list-style: none;
      }

      .step-list li {
        display: flex;
        gap: 12px;
        font-size: 15px;
        line-height: 1.65;
      }

      .step-number {
        display: inline-flex;
        width: 28px;
        height: 28px;
        flex: 0 0 28px;
        align-items: center;
        justify-content: center;
        background: var(--green);
        color: white;
        font-size: 14px;
        font-weight: 800;
      }

      .note {
        margin-top: 22px;
        border: 1px solid #e4d7a8;
        background: var(--yellow);
        padding: 16px;
      }

      .note p {
        margin: 8px 0 0;
        color: #5e5730;
        font-size: 14px;
        line-height: 1.65;
      }

      .empty {
        border: 1px dashed #b9c5b4;
        background: var(--paper);
        padding: 20px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 820px) {
        .top {
          align-items: stretch;
          flex-direction: column;
        }

        .stats {
          min-width: 0;
        }

        main.wrap {
          grid-template-columns: 1fr;
        }

        .columns {
          grid-template-columns: 1fr;
        }

        .detail-inner {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="top">
          <div>
            <p class="eyebrow">Recipe Archive</p>
            <h1>나만의 레시피북</h1>
          </div>
          <div class="stats">
            <div class="stat">
              <span>레시피</span>
              <strong id="recipeTotal">0</strong>
            </div>
            <div class="stat">
              <span>재료</span>
              <strong id="ingredientTotal">0</strong>
            </div>
          </div>
        </div>

        <div class="search">
          <label for="searchInput">재료 검색</label>
          <div class="searchbox">
            <input
              id="searchInput"
              type="search"
              placeholder="닭고기, 양파, 간장"
              autocomplete="off"
            />
            <button
              id="clearButton"
              class="clear"
              type="button"
              aria-label="검색어 지우기"
              title="검색어 지우기"
            >
              ×
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section>
        <div class="section-title">
          <h2>검색 결과</h2>
          <span id="resultCount" class="count">0개</span>
        </div>
        <div id="results" class="results"></div>
      </section>

      <article id="detail" class="detail"></article>
    </main>

    <script>
      const recipes = [
        {
          recipe_name: "앞다리살 제육볶음",
          servings: "2인분",
          ingredients: ["앞다리살 500g", "대파 1대", "양파 반개"],
          seasoning: [

            "맛술 4큰술",
            "고춧가루 2큰술 (매운맛 좋아하면 매운 고춧가루 1큰술 추가)",
            "물엿 2큰술",
            "다진 마늘 2큰술",
            "굴소스 1큰술",
            "설탕 1큰술",
          ],
          steps: [
            "식용유 2큰술 두르고 앞다리살부터 굽기",
            "고기가 90% 익으면 대파, 양파 넣기",
            "양파가 투명해질 때까지 볶기",
            "양념은 반만 먼저 넣고 볶기",
            "5분 정도 더 볶은 뒤 간 보면서 남은 양념 추가하면 끝!",
          ],
          notes: "추천 제품: 미담채 전복 굴소스 (여사님 추천)",
        },
        {
          recipe_name: "닭정육 간장 솥밥",
          servings: "미지정 (약 2인분 추정)",
          ingredients: [
            "닭정육 350g",
            "쌀 2컵",
            "물 2컵",
            "버터 10g",
            "올리브유 1T",
            "양파 반개",
            "부추 한줌",
            "옥수수캔",
          ],
          seasoning: ["간장 3T", "맛술 1T", "원당 2T", "마늘 반스푼", "후추"],
          steps: [
            "양파를 볶아 반투명해지면, 닭껍질을 아래로 두고 노릇하게 구운 후, 소스를 부어 졸입니다.",
            "고기와 소스를 덜어내고, 30분 이상 불린 쌀과 같은 양의 물을 넣습니다.",
            "중강불 (인덕션 7-8단)에서 5분, 약불 (인덕션 3-4단)에서 10분간 밥을 지은 뒤, 토핑을 얹고 뚜껑을 닫아 10분 동안 틈을 들입니다.",
          ],
          notes: "계량스푼 1T 기준 = 15ml (밥숟가락은 1.5배)",
        },
        {
          recipe_name: "큐브떡갈비",
          servings: "대용량 (다짐육 1kg 기준)",
          ingredients: [
            "소고기 다짐육 1kg (소고기다짐육+돼지고기다짐육=1kg도 가능)",
            "팽이버섯 1/3개",
            "표고버섯 4개",
            "모짜렐라치즈 (슬라이스형태 추천)",
          ],
          seasoning: [
            "진간장 6T",
            "올리고당 2.5T",
            "설탕 1.5T",
            "다진 마늘 1.5T",
            "맛술 4T",
            "소금 후추 톡톡",
            "전분가루 2T",
            "녹인 버터 60g",
          ],
          steps: [
            "팽이버섯과 표고버섯은 다져서 준비",
            "다짐육에 모든 재료를 넣고 치대듯이 섞는다",
            "큐브틀에 고기반죽을 깔고, 모짜렐라치즈를 올린뒤, 다시 고기반죽을 덮어 단단하게 꾹꾹 눌러준다",
          ],
          notes: "",
        },
        {
          recipe_name: "마제소바",
          servings: "2인분",
          ingredients: ["중화면 2인분", "돼지고기 다짐육 100g", "쪽파", "계란 노른자"],
          seasoning: [
            "미림 1스푼",
            "소금",
            "후추",
            "라오깐마(칠리오일) 2스푼",
            "쯔유 2스푼",
            "땅콩버터 2스푼",
            "식초 2스푼",
            "다진 마늘 반 스푼",
            "참치액 반 스푼",
            "깨 조금",
            "참기름 살짝",
          ],
          steps: [
            "돼지고기 다짐육 100g 에 미림 한 스푼, 소금, 후추 넣고 잘 볶아줍니다.",
            "라오깐마 2 스푼, 쯔유 2 스푼, 땅콩버터 2 스푼, 식초 2 스푼, 다진 마늘 반 스푼, 참치액 반 스푼, 그리고 깨를 조금 넣고 잘 섞어주세요.",
            "끓는 물에 중화면을 삶고, 면을 건져서 그릇에 담아줍니다.",
            "볶아둔 돼지고기, 소스, 쪽파를 올리고 계란 노른자를 가운데 올려줍니다.",
            "먹기전에 참기름 살짝 두르고 잘 비벼먹으면 완성!",
          ],
          notes: "",
        },
        {
          recipe_name: "초당옥수수 파스타",
          servings: "1인분 (추정)",
          ingredients: [
            "초당옥수수 1개 (스위트콘 대체 가능)",
            "숏파스타",
            "양파 1/4개",
            "페퍼론치노",
            "파마산치즈 1.5T",
            "파프리카가루 0.5T (고춧가루 대체가능)",
            "파슬리 0.5T",
            "버터 2스푼",
            "치킨스톡 반스푼",
            "소금 0.5티스푼",
            "후추",
          ],
          steps: [
            "초당옥수수는 전자레인지에 3분 쪄주세요(스위트콘은 물기빼고 그냥 쓰셔도 돼요)",
            "물 1L에 소금 반스푼보다 조금 많게 넣고 파스타 삶아주세요",
            "양파 1/4개 다져주고 초당옥수수는 알만 준비해주세요",
            "버터 2스푼에 양파, 페퍼론치노, 초당옥수수, 소금 0.5티스푼, 후추 넣고 볶아주세요",
            "삶은 파스타와 면수는 살짝 자박할 정도로 붓고 치킨스톡 반스푼 넣어서 약불에 졸여가며 볶아주세요",
            "촉촉하다 싶을 때 불끄고 접시 담아주세요",
            "파마산치즈 1.5T, 파프리카가루 0.5T, 파슬리 0.5T 넣고 섞어서 파스타 위에 뿌려주면 완성입니다!",
          ],
          notes: "매콤달콤짭짤한 맛에 톡톡거리는 옥수수 식감이 특징인 파스타",
        },
      ];

      const ingredientAliases = {
        닭고기: ["닭", "닭고기", "닭정육"],
        돼지고기: ["돼지", "돼지고기", "앞다리살", "돼지고기다짐육"],
        소고기: ["소고기", "쇠고기", "소고기다짐육"],
        고기: ["고기", "앞다리살", "다짐육", "닭정육"],
        옥수수: ["옥수수", "초당옥수수", "스위트콘", "콘"],
        면: ["면", "중화면", "파스타", "숏파스타"],
        버섯: ["버섯", "팽이버섯", "표고버섯"],
        치즈: ["치즈", "모짜렐라치즈", "파마산치즈"],
      };

      const searchInput = document.querySelector("#searchInput");
      const clearButton = document.querySelector("#clearButton");
      const results = document.querySelector("#results");
      const detail = document.querySelector("#detail");
      const resultCount = document.querySelector("#resultCount");
      const recipeTotal = document.querySelector("#recipeTotal");
      const ingredientTotal = document.querySelector("#ingredientTotal");

      let selectedName = recipes[0].recipe_name;

      function normalize(value) {
        return String(value || "")
          .replace(/\s+/g, "")
          .toLowerCase();
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function searchTerms(query) {
        const normalized = normalize(query);

        if (!normalized) {
          return [];
        }

        return Array.from(
          new Set([
            normalized,
            ...(ingredientAliases[normalized] || []).map(normalize),
          ]),
        );
      }

      function recipeSearchText(recipe) {
        return normalize(
          [
            recipe.recipe_name,
            recipe.servings,
            ...(recipe.ingredients || []),
            ...(recipe.seasoning || []),
            ...(recipe.steps || []),
            recipe.notes,
          ]
            .filter(Boolean)
            .join(" "),
        );
      }

      function matchedItems(recipe, terms) {
        if (terms.length === 0) {
          return [];
        }

        return [...(recipe.ingredients || []), ...(recipe.seasoning || [])].filter(
          (item) => terms.some((term) => normalize(item).includes(term)),
        );
      }

      function getFilteredRecipes() {
        const terms = searchTerms(searchInput.value);

        if (terms.length === 0) {
          return recipes;
        }

        return recipes.filter((recipe) =>
          terms.some((term) => recipeSearchText(recipe).includes(term)),
        );
      }

      function renderResults(filteredRecipes) {
        const terms = searchTerms(searchInput.value);
        resultCount.textContent = `${filteredRecipes.length}개`;

        if (filteredRecipes.length === 0) {
          results.innerHTML = `<div class="empty">검색 결과가 없어요.</div>`;
          return;
        }

        results.innerHTML = filteredRecipes
          .map((recipe) => {
            const matches = matchedItems(recipe, terms);
            const active = recipe.recipe_name === selectedName ? " active" : "";
            return `
              <button class="recipe-button${active}" type="button" data-name="${escapeHtml(recipe.recipe_name)}">
                <div class="card-head">
                  <div>
                    <p class="recipe-title">${escapeHtml(recipe.recipe_name)}</p>
                    ${
                      recipe.servings
                        ? `<p class="servings">${escapeHtml(recipe.servings)}</p>`
                        : ""
                    }
                  </div>
                  <span class="badge">${(recipe.ingredients || []).length} 재료</span>
                </div>
                <p class="ingredients-line">${escapeHtml((recipe.ingredients || []).join(", "))}</p>
                ${
                  matches.length > 0
                    ? `<div class="matches">${matches
                        .slice(0, 4)
                        .map((match) => `<span class="match">${escapeHtml(match)}</span>`)
                        .join("")}</div>`
                    : ""
                }
              </button>
            `;
          })
          .join("");

        document.querySelectorAll(".recipe-button").forEach((button) => {
          button.addEventListener("click", () => {
            selectedName = button.dataset.name;
            render();
            detail.scrollIntoView({ block: "start", behavior: "smooth" });
          });
        });
      }

      function renderDetail(recipe) {
        if (!recipe) {
          detail.innerHTML = `<div class="detail-inner empty">레시피를 선택해 주세요.</div>`;
          return;
        }

        detail.innerHTML = `
          <div class="detail-inner">
            <div class="detail-header">
              <h2 class="detail-title">${escapeHtml(recipe.recipe_name)}</h2>
              ${
                recipe.servings
                  ? `<div class="detail-servings">${escapeHtml(recipe.servings)}</div>`
                  : ""
              }
            </div>
            <div class="columns">
              <section>
                <h3>재료</h3>
                <ul class="pill-list">
                  ${(recipe.ingredients || [])
                    .map((ingredient) => `<li>${escapeHtml(ingredient)}</li>`)
                    .join("")}
                </ul>
              </section>
              ${
                (recipe.seasoning || []).length > 0
                  ? `<section>
                      <h3>양념</h3>
                      <ul class="pill-list seasoning">
                        ${(recipe.seasoning || [])
                          .map((item) => `<li>${escapeHtml(item)}</li>`)
                          .join("")}
                      </ul>
                    </section>`
                  : ""
              }
            </div>
            <section class="steps">
              <h3>조리 순서</h3>
              <ol class="step-list">
                ${(recipe.steps || [])
                  .map(
                    (step, index) => `
                      <li>
                        <span class="step-number">${index + 1}</span>
                        <span>${escapeHtml(step)}</span>
                      </li>
                    `,
                  )
                  .join("")}
              </ol>
            </section>
            ${
              recipe.notes
                ? `<section class="note">
                    <h3>메모</h3>
                    <p>${escapeHtml(recipe.notes)}</p>
                  </section>`
                : ""
            }
          </div>
        `;
      }

      function render() {
        const filteredRecipes = getFilteredRecipes();

        if (
          filteredRecipes.length > 0 &&
          !filteredRecipes.some((recipe) => recipe.recipe_name === selectedName)
        ) {
          selectedName = filteredRecipes[0].recipe_name;
        }

        renderResults(filteredRecipes);
        renderDetail(
          filteredRecipes.find((recipe) => recipe.recipe_name === selectedName),
        );
        clearButton.style.visibility = searchInput.value ? "visible" : "hidden";
      }

      recipeTotal.textContent = recipes.length;
      ingredientTotal.textContent = new Set(
        recipes.flatMap((recipe) =>
          [...(recipe.ingredients || []), ...(recipe.seasoning || [])].map(
            normalize,
          ),
        ),
      ).size;

      searchInput.addEventListener("input", render);
      clearButton.addEventListener("click", () => {
        searchInput.value = "";
        searchInput.focus();
        render();
      });

      render();
    </script>
  </body>
</html>
